<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>WebAuthn OS 認証デモ</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    button { font-size: 16px; padding: 10px 20px; }
    pre { margin-top: 20px; background: #f5f5f5; padding: 10px; }
  </style>
</head>
<body>
  <h1>OS 認証（WebAuthn）デモ</h1>
  <p>ボタンを押すと OS の認証 UI（Touch ID / Face ID / Windows Hello）が出る。</p>

  <button id="authBtn">認証する</button>
  <pre id="log"></pre>

  <script>
    const log = (msg) => {
      document.getElementById("log").textContent += msg + "\n";
    };

    async function verifyUser() {
      const challenge = new Uint8Array([1, 2, 3, 4, 5, 6, 7, 8]);

      const publicKey = {
        challenge,
        userVerification: "required",
        allowCredentials: [] // 既存のパスキーを自動選択
      };

      try {
        const cred = await navigator.credentials.get({ publicKey });
        return true;
      } catch (err) {
        console.error(err);
        return false;
      }
    }

    document.getElementById("authBtn").onclick = async () => {
      log("認証開始...");
      if (!window.PublicKeyCredential) {
        log("このブラウザは WebAuthn に対応していません");
        return;
      }

      const result = await verifyUser();
      log("結果: " + result);
    };
  </script>
</body>
</html>
